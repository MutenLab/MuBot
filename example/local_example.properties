# Project configuration - machine-specific settings (do not commit to git)
# Update this path to match your local project directory
project.dir=/Users/icerrate/AndroidStudioProjects/MuBot

# ADB emulator ID (get with: adb devices)
emulator.id=127.0.0.1:5555

# Game package name installed on emulator
game.package=com.tszz.gpen.nowgg

# Quick buff mode: when true, only one buff (attack OR defense) is needed.
# When false, both buffs must be found (default behavior).
quick.buff=false

# When true, uses satan_immortal.png marker. When false, uses satan.png marker.
use.immortal.satan=true

# Seconds to wait picking up items after killing a target
pickup.items.boss=10
pickup.items.golden=4

# Timeout in seconds for smartAutoPlay attack script (4min)
autoPlay.attack.timeout=240
# Interval in seconds to check healthbar for smartAutoPLay attack script
autoPlay.healthbar.check.interval=1
# Number of consecutive "no health bar" detections before considering the target dead
autoPlay.healthbar.times.killed=1

# Potion buying during farming runs
farm.buy.potions=true
farm.health.potions=2500
farm.mana.potions=2000
# Enable auto recycle during traveling and events
farm.auto.recycle=true

# Sanctuary settings
sanctuary.level=2
sanctuary.wires=1,2
# Potion target amounts for buying during sanctuary runs
sanctuary.health.potions=3000
sanctuary.mana.potions=3000

# Event schedule (hours comma-separated, minutes define the window)
event.devil.square.hours=0,2,4,6
event.devil.square.minutes.start=0
event.devil.square.minutes.end=14
event.blood.castle.hours=1,3,5
event.blood.castle.minutes.start=0
event.blood.castle.minutes.end=14
event.devil.square.max.fails=3
event.blood.castle.max.fails=3
# Plan changes for events (0=no change, 1=plan 1, 2=plan 2)
plan.before.devil.square=1
plan.after.devil.square=2
plan.before.blood.castle=2
plan.after.blood.castle=0
# Toggle gold pickup before/after Blood Castle and Devil Square events
event.change.gold.pickup=false
